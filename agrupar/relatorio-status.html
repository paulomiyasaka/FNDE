<!-- CONTEÚDO -->
<div class="container mt-4">

    <h3 class="mb-3">Relatório – Status do Agrupamento</h3>

    <!-- FILTROS -->
    <div class="card mb-4">
        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Data Inicial</label>
                    <input type="date" id="dtInicio" class="form-control fs-5">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Data Final</label>
                    <input type="date" id="dtFim" class="form-control fs-5">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Estado</label>
                    <select id="estado" class="form-select fs-5">
                        <option value="">Todos</option>
                        <option value="DF">DF</option>
                        <option value="GO">GO</option>
                        <option value="SP">SP</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Centralizadora</label>
                    <select id="centralizadora" class="form-select fs-5">
                        <option value="">Todas</option>
                        <option value="Central A">Central A</option>
                        <option value="Central B">Central B</option>
                    </select>
                </div>

                <div class="col-md-12 text-end mt-3">
                    <button id="btnPesquisar" class="btn btn-primary fs-5">
                        Pesquisar
                    </button>
                    <button id="btnExportar" class="btn btn-success fs-5">
                        Exportar Excel
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- TABELA -->
<div class="card">
    <div class="card-body">

        <table class="table table-bordered table-sm table-hover">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th class="sortable" data-col="data">Data</th>
                    <th class="sortable" data-col="estado">Estado</th>
                    <th class="sortable" data-col="central">Centralizadora</th>
                    <th>Paletes</th>
                    <th>Peso (kg)</th>
                </tr>
            </thead>
            <tbody id="tblStatus"></tbody>
        </table>

    </div>
</div>
