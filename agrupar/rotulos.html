<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema - Rótulos</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS do módulo -->
    <link rel="stylesheet" href="css/rotulos.css">
</head>

<body class="bg-body-tertiary fs-5">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom fs-5">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand" href="index.html">
            <img src="logo.png" alt="Logo" height="80">
        </a>

        <!-- BOTÃO MOBILE -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        Agrupamento
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="rotulos.html">
                        Rótulos
                    </a>
                </li>

                <!-- DROPDOWN RELATÓRIOS -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       href="#"
                       id="dropdownRelatorios"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">
                        Relatórios
                    </a>

                    <ul class="dropdown-menu" aria-labelledby="dropdownRelatorios">
                        <li>
                            <a class="dropdown-item" href="relatorio-status.html">
                                Status do Agrupamento
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="relatorio-analitico.html">
                                Agrupados – Analítico
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="relatorio-sintetico.html">
                                Agrupados – Sintético
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-4">

    <div class="card">
        <div class="card-body fs-5">

            <h4 class="mb-4 fs-4">Consulta de Rótulos</h4>

            <!-- INPUT + BOTÃO -->
            <div class="input-group mb-3">
                <input
                    type="text"
                    id="codigoPalete"
                    class="form-control fs-5"
                    placeholder="Digite o número do palete"
                >
                <button id="btnPesquisar" class="btn btn-primary fs-5">
                    Pesquisar
                </button>
            </div>

            <!-- RESULTADO -->
            <div id="areaResultado" class="d-none">

                <div class="alert alert-secondary fs-5">
                    Palete localizado em agrupamento
                </div>

                <div class="row mb-2">
                    <div class="col-md-6">
                        <strong>Estado:</strong> <span id="rEstado"></span>
                    </div>
                    <div class="col-md-6">
                        <strong>Centralizadora:</strong> <span id="rCentral"></span>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Quantidade de Paletes:</strong> <span id="rQtd"></span>
                    </div>
                    <div class="col-md-6">
                        <strong>Peso Total (kg):</strong> <span id="rPeso"></span>
                    </div>
                </div>

                <table class="table table-sm table-bordered fs-5">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Palete</th>
                            <th>Peso (kg)</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPaletes"></tbody>
                </table>

                <button id="btnImprimir" class="btn btn-success fs-5 mt-3" disabled>
                    Imprimir Rótulo
                </button>

            </div>

        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalInfo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content fs-5">
            <div class="modal-header">
                <h5 class="modal-title">Aviso</h5>
            </div>
            <div class="modal-body" id="modalMensagem"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary fs-5" data-bs-dismiss="modal">
                    Fechar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastMsg" class="toast">
        <div class="toast-body fs-5"></div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS do módulo -->
<script src="js/rotulos.js"></script>

</body>
</html>
