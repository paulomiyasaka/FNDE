    <!-- CSS dos relatórios -->
    <link rel="stylesheet" href="css/relatorios.css">
</head>

<body class="bg-body-tertiary fs-5">

<!-- MENU PADRÃO (o mesmo do status, não mexer) -->
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom fs-5">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">
            <img src="logo.png" height="80" alt="Logo">
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Agrupamento</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="rotulos.html">Rótulos</a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        Relatórios
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="relatorio-status.html">Status</a></li>
                        <li><a class="dropdown-item active" href="relatorio-analitico.html">Analítico</a></li>
                        <li><a class="dropdown-item" href="relatorio-sintetico.html">Sintético</a></li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-4">

    <h3 class="mb-3">Relatório – Agrupados Sintético</h3>

    <!-- FILTROS -->
    <div class="card mb-4">
        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Data Inicial</label>
                    <input type="date" id="dtInicio" class="form-control fs-5">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Data Final</label>
                    <input type="date" id="dtFim" class="form-control fs-5">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Estado</label>
                    <select id="estado" class="form-select fs-5">
                        <option value="">Todos</option>
                        <option>DF</option>
                        <option>GO</option>
                        <option>SP</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Centralizadora</label>
                    <select id="centralizadora" class="form-select fs-5">
                        <option value="">Todas</option>
                        <option>Central A</option>
                        <option>Central B</option>
                    </select>
                </div>

                <div class="col-md-12 text-end mt-3">
                    <button id="btnPesquisar" class="btn btn-primary fs-5">
                        Pesquisar
                    </button>
                    <button id="btnExportar" class="btn btn-success fs-5">
                        Exportar Excel
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- TABELA -->
    <div class="card">
        <div class="card-body">

            <table class="table table-bordered table-sm table-hover">
                <thead class="table-light">
                    <tr>
                        <th class="sortable" data-col="data">Data</th>
                        <th class="sortable" data-col="estado">Estado</th>
                        <th class="sortable" data-col="central">Centralizadora</th>
                        <th>Agrupamentos</th>
                        <th>Paletes</th>
                        <th>Encomendas</th>
                        <th>Peso (kg)</th>
                    </tr>
                </thead>
                <tbody id="tblSintetico"></tbody>
            </table>

        </div>
    </div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastMsg" class="toast">
        <div class="toast-body fs-5"></div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS do relatório -->
<script src="js/sintetico.js"></script>

</body>
</html>
